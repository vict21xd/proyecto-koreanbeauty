server:
  port: 7070

spring:
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:

        - id: auth-service
          uri: http://localhost:7074
          predicates:
            - Path=/auth/**
          filters:
            - AddRequestHeader=X-Gateway, ApiGateway

        - id: cliente-service
          uri: http://localhost:7071
          predicates:
            - Path=/clientes/**
          filters:
            - AddRequestHeader=X-Gateway, ApiGateway

        - id: compra-service
          uri: http://localhost:7072
          predicates:
            - Path=/compras/**
          filters:
            - AddRequestHeader=X-Gateway, ApiGateway

        - id: producto-service
          uri: http://localhost:7073
          predicates:
            - Path=/productos/**
          filters:
            - AddRequestHeader=X-Gateway, ApiGateway

        - id: inventario-service
          uri: http://localhost:7075
          predicates:
            - Path=/inventarios/**
          filters:
            - AddRequestHeader=X-Gateway, ApiGateway

        - id: pago-service
          uri: http://localhost:9095
          predicates:
            - Path=/pagos/**
          filters:
            - AddRequestHeader=X-Gateway, ApiGateway

        - id: categoria-service
          uri: http://localhost:9096
          predicates:
            - Path=/categorias/**
          filters:
            - AddRequestHeader=X-Gateway, ApiGateway

        - id: resena-service
          uri: http://localhost:7076
          predicates:
            - Path=/resenas/**
          filters:
            - AddRequestHeader=X-Gateway, ApiGateway